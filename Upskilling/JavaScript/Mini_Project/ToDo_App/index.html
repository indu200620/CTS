<!DOCTYPE html>
<html>

<head>

<title>To Do App</title>

<style>

body{
font-family:Arial;
width:500px;
margin:auto;
}

input{
width:300px;
padding:10px;
}

button{
padding:10px;
}

li{
margin:10px;
}

</style>

</head>

<body>

<h1>To Do App</h1>

<input
type="text"
id="task"
placeholder="Enter Task">

<button onclick="addTask()">
Add
</button>

<ul id="list"></ul>

<script>

function addTask(){

let task =
document.getElementById("task").value;

if(task === "")
return;

let li =
document.createElement("li");

li.textContent = task;

document
.getElementById("list")
.appendChild(li);

document
.getElementById("task")
.value = "";

}

</script>

</body>

</html>
